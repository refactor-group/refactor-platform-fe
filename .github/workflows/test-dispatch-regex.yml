# =============================================================================
# Regression tests for dispatch-pr-preview-frontend.yml input regexes
# =============================================================================
# The classification logic in dispatch-pr-preview-frontend.yml (PR# vs
# numeric vs SHA vs branch) is exactly the kind of code that silently
# breaks on edits. This workflow runs the bats suite on PRs that touch the
# dispatch workflow or the tests themselves.
# =============================================================================
name: Test Dispatch Regex

on:
    pull_request:
        paths:
            - ".github/workflows/dispatch-pr-preview-frontend.yml"
            - ".github/workflows/tests/dispatch-pr-preview-frontend.bats"
            - ".github/workflows/test-dispatch-regex.yml"
    push:
        branches: [main]
        paths:
            - ".github/workflows/dispatch-pr-preview-frontend.yml"
            - ".github/workflows/tests/dispatch-pr-preview-frontend.bats"
            - ".github/workflows/test-dispatch-regex.yml"

permissions:
    contents: read

jobs:
    bats:
        name: Run bats classifier tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install bats
              run: sudo apt-get update && sudo apt-get install -y bats
            - name: Run tests
              run: bats .github/workflows/tests/dispatch-pr-preview-frontend.bats
