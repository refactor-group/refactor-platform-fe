# =============================================================================
# Manual PR Preview Deployment (Frontend)
# =============================================================================
# Purpose: Deploy a PR preview environment for a frontend PR, paired with any
#          backend ref (main, branch, SHA, or a backend PR).
#
# Inputs are resolved at dispatch time via the GitHub API — this workflow does
# NOT depend on any pre-populated dropdown lists and does NOT need any external
# workflow to keep itself fresh. Nothing is ever written to main.
#
# Usage:
#   Actions → Deploy PR Preview (Manual Select) → Run workflow
#     frontend_pr_number:  373              (required — PR in this repo)
#     frontend_sha_override: <7+ hex>       (optional — override PR branch HEAD)
#     backend_ref:         main             (default; or a branch, SHA, PR#<num>)
#
# Companion helper: the backend repo hosts `list-preview-refs.yml`, a
# read-only workflow that prints current main commits + open PRs from both
# repos to the run summary. Use it when you don't remember a ref.
#
# Cross-repo secret resolution:
#   The reusable workflow's `environment: pr-preview` resolves secrets from
#   THIS repo (the caller), NOT the backend repo. Backend-specific secrets
#   (Tiptap, MailerSend) are unavailable here — the reusable workflow uses
#   || 'UNUSED' fallback defaults for them.
# =============================================================================

name: Deploy PR Preview (Manual Select)
on:
  workflow_dispatch:
    inputs:
      frontend_pr_number:
        description: "Frontend PR number to deploy (e.g. 373 or PR#373)"
        required: true
        type: string
      frontend_sha_override:
        description: "Optional: frontend commit SHA on the PR branch (default: HEAD)"
        required: false
        type: string
        default: ""
      backend_ref:
        description: "Backend ref: main (default), a branch name, a 7+ char SHA, or PR#<num>"
        required: false
        type: string
        default: "main"
# Prevent concurrent deployments for the same frontend PR
concurrency:
  group: pr-preview-frontend-dispatch-${{ inputs.frontend_pr_number }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write
  pull-requests: write
  attestations: write
  id-token: write
jobs:
  # ===========================================================================
  # JOB 1: Validate inputs and resolve refs → full SHAs
  # ===========================================================================
  validate:
    name: Validate PR & Resolve Refs
    runs-on: ubuntu-latest
    outputs:
      backend_sha: ${{ steps.resolve.outputs.backend_sha }}
      frontend_sha: ${{ steps.resolve.outputs.frontend_sha }}
      branch_name: ${{ steps.resolve.outputs.branch_name }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
    steps:
      - name: Resolve PR + refs to full SHAs
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_FRONTEND_PR: ${{ inputs.frontend_pr_number }}
          INPUT_FRONTEND_SHA_OVERRIDE: ${{ inputs.frontend_sha_override }}
          INPUT_BACKEND_REF: ${{ inputs.backend_ref }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          # ------------------------------------------------------------------
          # Normalize the frontend PR number: accept "373" or "PR#373"
          # ------------------------------------------------------------------
          if [[ "$INPUT_FRONTEND_PR" =~ ^PR#([0-9]+)$ ]]; then
              PR_NUMBER="${BASH_REMATCH[1]}"
          elif [[ "$INPUT_FRONTEND_PR" =~ ^[0-9]+$ ]]; then
              PR_NUMBER="$INPUT_FRONTEND_PR"
          else
              echo "::error::frontend_pr_number must be a number or 'PR#<num>', got: $INPUT_FRONTEND_PR"
              exit 1
          fi

          # ------------------------------------------------------------------
          # Validate the frontend PR exists and is OPEN (drafts allowed)
          # ------------------------------------------------------------------
          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$OWNER/refactor-platform-fe" \
              --json state,isDraft,headRefName,headRefOid 2>&1) || {
              echo "::error::Frontend PR #$PR_NUMBER not found in $OWNER/refactor-platform-fe"
              exit 1
          }
          PR_STATE=$(echo "$PR_JSON" | jq -r '.state')
          PR_IS_DRAFT=$(echo "$PR_JSON" | jq -r '.isDraft')
          BRANCH_NAME=$(echo "$PR_JSON" | jq -r '.headRefName')
          PR_HEAD_SHA=$(echo "$PR_JSON" | jq -r '.headRefOid')

          if [[ "$PR_STATE" != "OPEN" ]]; then
              echo "::error::Frontend PR #$PR_NUMBER is $PR_STATE (must be OPEN). Draft PRs are allowed."
              exit 1
          fi
          echo "::notice::Frontend PR #$PR_NUMBER is valid (state: $PR_STATE, draft: $PR_IS_DRAFT, branch: $BRANCH_NAME)"

          # ------------------------------------------------------------------
          # Determine the frontend SHA (HEAD of PR branch unless overridden)
          # ------------------------------------------------------------------
          if [[ -n "$INPUT_FRONTEND_SHA_OVERRIDE" ]]; then
              if ! [[ "$INPUT_FRONTEND_SHA_OVERRIDE" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
                  echo "::error::frontend_sha_override must be a hex SHA (7-40 chars)"
                  exit 1
              fi
              FRONTEND_FULL_SHA=$(gh api "repos/$OWNER/refactor-platform-fe/commits/$INPUT_FRONTEND_SHA_OVERRIDE" \
                  --jq '.sha' 2>&1) || {
                  echo "::error::Frontend SHA override '$INPUT_FRONTEND_SHA_OVERRIDE' not found in $OWNER/refactor-platform-fe"
                  exit 1
              }
              echo "::notice::Using frontend SHA override: ${FRONTEND_FULL_SHA:0:7}"
          else
              FRONTEND_FULL_SHA="$PR_HEAD_SHA"
              echo "::notice::Using frontend PR #$PR_NUMBER HEAD: ${FRONTEND_FULL_SHA:0:7}"
          fi

          # ------------------------------------------------------------------
          # Resolve the backend ref. Precedence:
          #   1. "PR#<num>"                    → look up the PR's HEAD SHA
          #   2. anything else (SHA or branch) → resolve via `commits/<ref>`
          #
          # The GitHub `commits/<ref>` endpoint is ref-type-agnostic: it
          # accepts a full/short SHA, a branch name, or a tag. Edge case:
          # a branch literally named in 7-40 hex chars resolves identically
          # — only the log line wording would have differed, which is why
          # the SHA/branch arms are intentionally collapsed.
          # ------------------------------------------------------------------
          BE_REPO="$OWNER/refactor-platform-rs"
          if [[ "$INPUT_BACKEND_REF" =~ ^PR#([0-9]+)$ ]]; then
              BE_PR="${BASH_REMATCH[1]}"
              BACKEND_FULL_SHA=$(gh pr view "$BE_PR" --repo "$BE_REPO" \
                  --json headRefOid --jq '.headRefOid' 2>&1) || {
                  echo "::error::Backend PR #$BE_PR not found in $BE_REPO"
                  exit 1
              }
              echo "::notice::Backend ref resolved from PR #$BE_PR: ${BACKEND_FULL_SHA:0:7}"
          else
              BACKEND_FULL_SHA=$(gh api "repos/$BE_REPO/commits/$INPUT_BACKEND_REF" \
                  --jq '.sha' 2>&1) || {
                  echo "::error::Backend ref '$INPUT_BACKEND_REF' not found in $BE_REPO (tried as SHA/branch/tag)"
                  exit 1
              }
              echo "::notice::Backend ref '$INPUT_BACKEND_REF' resolved to: ${BACKEND_FULL_SHA:0:7}"
          fi

          {
              echo "backend_sha=$BACKEND_FULL_SHA"
              echo "frontend_sha=$FRONTEND_FULL_SHA"
              echo "branch_name=$BRANCH_NAME"
              echo "pr_number=$PR_NUMBER"
          } >> "$GITHUB_OUTPUT"
  # ===========================================================================
  # JOB 2: Deploy using the reusable workflow from the backend repo
  # ===========================================================================
  deploy:
    name: Deploy PR Preview
    needs: validate
    uses: refactor-group/refactor-platform-rs/.github/workflows/ci-deploy-pr-preview.yml@main
    with:
      repo_type: "frontend"
      pr_number: ${{ needs.validate.outputs.pr_number }}
      branch_name: ${{ needs.validate.outputs.branch_name }}
      backend_sha: ${{ needs.validate.outputs.backend_sha }}
      frontend_sha: ${{ needs.validate.outputs.frontend_sha }}
      force_rebuild: false
    secrets: inherit
